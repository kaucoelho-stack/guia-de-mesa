<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a3a2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Guia de Mesa">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Guia de Mesa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --felt:#1a3a2a;--gold:#c9a84c;--gold-light:#e8c97a;--gold-dark:#8a6a1f;
  --parchment:#f5edd8;--pd:#e8dcc0;--ink:#2c1a0e;--inkl:#5a3e28;
  --cream:#faf5e8;--red:#8b2020;--rbg:#fdf0f0;--rbr:#e8c0c0;
  --abg:#fdf8e8;--abr:#e8dca0;--at:#6b4e00;
  --bbg:#eef4ff;--bbr:#b8d0f0;--bt:#1a3a6b;
  --gbg:#edfaf2;--gbr:#a8dfc0;--gt:#1a5c2a;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Crimson Pro',serif;font-size:15px;
  background:var(--felt);color:var(--ink);
  display:flex;flex-direction:column;
}

/* ── APP SHELL ── */
.app{
  display:flex;flex-direction:column;height:100%;
  padding-top:var(--safe-top);
}

/* ── HEADER ── */
.header{
  background:linear-gradient(180deg,#0a1e12 0%,var(--felt) 100%);
  border-bottom:2px solid var(--gold-dark);
  padding:14px 16px 10px;
  flex-shrink:0;
}
.hrow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.logo{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--gold);letter-spacing:2px;line-height:1.1;}
.logo span{font-size:10px;display:block;color:rgba(201,168,76,.6);letter-spacing:3px;font-style:italic;font-family:'Crimson Pro',serif;}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.07);border:1px solid rgba(201,168,76,.25);
  border-radius:20px;padding:7px 12px;
}
.search-box input{
  background:none;border:none;outline:none;color:var(--gold-light);
  font-family:'Crimson Pro',serif;font-size:14px;width:100%;
}
.search-box input::placeholder{color:rgba(201,168,76,.4);}
.search-icon{color:rgba(201,168,76,.5);font-size:15px;flex-shrink:0;}
.col-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.col-tabs::-webkit-scrollbar{display:none;}
.col-tab{
  padding:5px 13px;border-radius:20px;font-family:'Cinzel',serif;font-size:10px;
  letter-spacing:.5px;cursor:pointer;border:1.5px solid rgba(201,168,76,.25);
  color:rgba(201,168,76,.6);background:transparent;transition:all .15s;white-space:nowrap;
  flex-shrink:0;
}
.col-tab.active{background:var(--gold);color:var(--ink);border-color:var(--gold);}

/* ── GRID ── */
.content{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.game-card{
  background:var(--parchment);border-radius:10px;border:1.5px solid var(--gold-dark);
  padding:14px 11px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;
  -webkit-user-select:none;user-select:none;
}
.game-card:active{transform:scale(.97);border-color:var(--gold);}
.game-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 60%);pointer-events:none;}
.game-emoji{font-size:30px;display:block;margin-bottom:7px;}
.game-title{font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:var(--ink);line-height:1.3;margin-bottom:3px;}
.game-meta{font-size:11px;color:var(--inkl);font-style:italic;}
.game-badge{display:inline-block;font-size:9px;font-family:'Cinzel',serif;padding:2px 6px;border-radius:10px;margin-top:5px;background:#d4edda;color:#1a5c2a;border:1px solid #a8d5b0;}

/* ── PANEL (full screen on mobile) ── */
.panel-overlay{
  position:fixed;inset:0;background:var(--cream);z-index:100;
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  padding-bottom:var(--safe-bottom);
}
.panel-overlay.open{transform:translateX(0);}
.panel-header{
  background:var(--pd);border-bottom:1.5px solid var(--gold-dark);
  padding:12px 15px;padding-top:calc(12px + var(--safe-top));
  flex-shrink:0;
}
.pb-btn{
  font-size:13px;color:var(--inkl);font-style:italic;cursor:pointer;
  display:flex;align-items:center;gap:5px;margin-bottom:8px;
  -webkit-user-select:none;user-select:none;
}
.pb-btn:active{opacity:.6;}
.ptitle{font-family:'Cinzel',serif;font-size:17px;font-weight:700;color:var(--ink);margin-bottom:2px;}
.psub{font-size:12px;color:var(--inkl);font-style:italic;margin-bottom:9px;}
.mode-tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;}
.mode-tabs::-webkit-scrollbar{display:none;}
.mode-tab{
  padding:6px 13px;border-radius:20px;font-family:'Cinzel',serif;font-size:10px;
  letter-spacing:.5px;cursor:pointer;border:1.5px solid var(--pd);
  color:var(--inkl);background:white;transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.mode-tab.active{background:var(--ink);color:var(--gold);border-color:var(--ink);}
.panel-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.goal-bar{background:var(--abg);border:1px solid var(--abr);border-radius:8px;padding:9px 13px;margin:12px 15px 0;}
.goal-bar strong{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--at);display:block;margin-bottom:3px;}
.goal-bar p{font-size:13.5px;color:var(--ink);line-height:1.5;}
.score-bar{background:var(--gbg);border:1px solid var(--gbr);border-radius:8px;padding:9px 13px;margin:8px 15px 0;}
.score-bar strong{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--gt);display:block;margin-bottom:6px;}
.score-pills{display:flex;flex-wrap:wrap;gap:5px;}
.score-pill{background:white;border:1px solid var(--gbr);border-radius:12px;padding:4px 9px;font-size:12px;color:var(--ink);display:flex;align-items:center;gap:5px;}
.sp-val{font-family:'Cinzel',serif;font-size:10px;font-weight:600;color:var(--gt);}
.panel-body{padding:14px 15px 24px;}

/* ── FLOW ── */
.sec-title{font-family:'Cinzel',serif;font-size:10px;font-weight:600;letter-spacing:2px;color:var(--inkl);text-transform:uppercase;margin:0 0 10px;display:flex;align-items:center;gap:7px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--pd);}
.check-list{margin-bottom:18px;}
.check-item{display:flex;gap:10px;padding:8px 0;border-bottom:.5px solid var(--pd);align-items:flex-start;cursor:pointer;-webkit-user-select:none;user-select:none;}
.check-item:last-child{border-bottom:none;}
.check-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--gold-dark);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;background:white;transition:all .15s;}
.check-box.checked{background:var(--gold-dark);}
.check-box.checked::after{content:'✓';font-size:11px;color:white;font-weight:bold;}
.check-text{font-size:13.5px;color:var(--ink);line-height:1.45;}
.check-text.done{text-decoration:line-through;opacity:.5;}
.flow-wrap{margin-bottom:18px;}
.flow-node{background:white;border:1px solid var(--pd);border-radius:10px;padding:11px 13px;}
.fnh{display:flex;align-items:flex-start;gap:10px;}
.fn{width:22px;height:22px;border-radius:50%;background:var(--ink);color:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.fl{font-size:14px;color:var(--ink);line-height:1.5;flex:1;}
.fl strong{font-family:'Cinzel',serif;font-size:12px;display:block;margin-bottom:2px;}
.flow-hint{background:var(--bbg);border:1px solid var(--bbr);border-radius:6px;padding:7px 10px;margin-top:8px;font-size:12.5px;color:var(--bt);line-height:1.4;}
.flow-warn{background:var(--rbg);border:1px solid var(--rbr);border-radius:6px;padding:7px 10px;margin-top:8px;display:flex;gap:7px;align-items:flex-start;}
.fwd{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:5px;}
.fwt{font-size:12.5px;color:var(--red);line-height:1.4;font-style:italic;}
.flow-branch{margin-top:10px;padding-left:10px;border-left:2px solid var(--pd);}
.fbt{font-size:10px;font-family:'Cinzel',serif;letter-spacing:1px;color:var(--inkl);margin-bottom:6px;}
.flow-option{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:.5px solid var(--pd);}
.flow-option:last-child{border-bottom:none;}
.fot{font-family:'Cinzel',serif;font-size:10px;padding:3px 7px;border-radius:10px;background:var(--pd);color:var(--inkl);flex-shrink:0;margin-top:2px;white-space:nowrap;}
.fox{font-size:13px;color:var(--ink);line-height:1.45;}
.fow{font-size:12px;color:var(--red);font-style:italic;display:block;margin-top:3px;}
.foh{font-size:12px;color:var(--bt);display:block;margin-top:3px;}
.flow-arrow{text-align:center;color:var(--gold-dark);font-size:18px;line-height:1;margin:4px 0;}
.flow-end{background:var(--ink);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.fei{font-size:18px;flex-shrink:0;}
.fet{font-size:13.5px;color:var(--gold-light);line-height:1.45;}
.fet strong{font-family:'Cinzel',serif;font-size:10px;display:block;color:var(--gold);letter-spacing:1px;margin-bottom:3px;}
.fwb{background:var(--rbg);border:1px solid var(--rbr);border-radius:10px;padding:9px 12px;margin-bottom:5px;display:flex;gap:7px;align-items:flex-start;}

/* ── PLAYER CARD ── */
.player-card{background:white;border:1.5px solid var(--gold-dark);border-radius:10px;padding:15px;margin-bottom:16px;}
.pct{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.pc-section{margin-bottom:11px;}
.pc-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--inkl);text-transform:uppercase;margin-bottom:5px;}
.pc-item{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:.5px solid var(--pd);font-size:13.5px;color:var(--ink);line-height:1.45;}
.pc-item:last-child{border-bottom:none;}
.pc-num{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--gold-dark);flex-shrink:0;width:16px;}
.pc-rem{background:var(--abg);border:1px solid var(--abr);border-radius:6px;padding:8px 11px;font-size:12.5px;color:var(--at);line-height:1.4;margin-top:8px;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px 20px;color:rgba(201,168,76,.5);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-text{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="hrow">
      <div class="logo">Guia de Mesa<span>referência rápida</span></div>
    </div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="search" id="searchInput" placeholder="Buscar jogo..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div style="margin-top:8px;">
      <div class="col-tabs" id="colTabs"></div>
    </div>
  </div>
  <div class="content">
    <div class="game-grid" id="gameGrid"></div>
  </div>
</div>

<!-- PANEL -->
<div class="panel-overlay" id="panelOverlay">
  <div class="panel-header">
    <div class="pb-btn" onclick="closePanel()">← voltar à coleção</div>
    <div class="ptitle" id="panelTitle"></div>
    <div class="psub" id="panelMeta"></div>
    <div class="mode-tabs" id="modeTabs"></div>
  </div>
  <div class="panel-scroll">
    <div class="goal-bar" id="goalBar"></div>
    <div class="score-bar" id="scoreBar"></div>
    <div class="panel-body" id="panelBody"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────
const COLS=[
  {label:"🗂 Todos",ids:null},
  {label:"🏝 Estratégia",ids:[1,3,4,6,7]},
  {label:"🎉 Social",ids:[2,5,8,9,10]},
  {label:"🧟 Temático",ids:[11]},
];

const GAMES=[
  {id:1,name:"Abyss",players:"2–4",emoji:"🐙",
   goal:"Acumule mais Pontos de Prestígio que os adversários. Pontos vêm de Lordes recrutados, Locais controlados, Pérolas Negras guardadas e conjuntos de Aliados-troféu.",
   scoring:[{l:"Lordes recrutados",v:"pontos impressos na carta"},{l:"Locais controlados",v:"pontos + bônus imediato"},{l:"Pérolas Negras guardadas",v:"1 pt cada"},{l:"Aliados-troféu",v:"pts por conjunto de símbolos"}],
   playerCard:{action:["Escolha UMA das 3 ações: Explorar, Recrutar Lorde ou Controlar Local","Ao explorar: outros jogadores podem comprar a carta revelada por 1 Pérola antes de você decidir","Ao recrutar: descarte Aliados do símbolo correto para pagar o custo do Lorde","Ao controlar: gaste Chaves (símbolo em alguns Lordes) para tomar um Local disponível"],remember:["Aliados não usados viram troféus no fim — 3 do mesmo símbolo = 1 Pérola a qualquer momento","Pérolas Negras ficam guardadas e valem 1 pt cada — não gaste sem necessidade","1º a controlar um Local: bônus maior. 2º: bônus menor. 3º+: sem bônus","O jogo acaba quando o último Local for controlado"]},
   setup:["Separar as 5 pilhas de Aliados por localização (cada pilha tem um símbolo diferente) e embaralhar cada uma separadamente","Revelar 1 Aliado virado para cima em cada uma das 5 localizações no tabuleiro central","Embaralhar as cartas de Lorde e colocar 6 viradas para cima na fileira de recrutamento — esses são os Lordes disponíveis para recrutar","Posicionar as cartas de Local viradas para baixo; revelar a quantidade inicial indicada no manual","Cada jogador recebe: 1 Pérola Negra + fichas de recursos conforme o número de jogadores (ver tabela no manual)","O jogador mais jovem começa"],
   flow:[
     {t:"s",n:1,label:"<strong>Escolha UMA das 3 ações:</strong>",branch:{title:"OPÇÕES DE AÇÃO",opts:[
       {tag:"Explorar",text:"Vire a carta do topo do deck de uma localização. Da esquerda para a direita, cada adversário pode comprá-la por 1 Pérola. Se ninguém comprar, você decide: fica com ela OU descarta para ganhar 1 Pérola.",warn:"3 descartes seguidos na mesma localização = você recebe 1 Aliado daquela localização de graça.",hint:"Explore bastante no início para juntar Aliados. Sem Aliados não dá para recrutar Lordes."},
       {tag:"Recrutar Lorde",text:"Escolha 1 Lorde da fileira. Pague seu custo descartando Aliados do símbolo indicado na carta. O Lorde vai para sua área — um novo é revelado na fileira para repor.",warn:"Cada Lorde exige um símbolo específico — Aliados de símbolos diferentes não substituem uns aos outros.",hint:"Lordes com símbolo de Chave são essenciais para controlar Locais — recrute pelo menos um."},
       {tag:"Controlar Local",text:"Escolha um Local disponível e pague o custo em Chaves (símbolo presente em alguns dos seus Lordes). Receba o bônus imediato impresso no Local.",warn:"1º jogador a controlar o Local: bônus maior. 2º: bônus menor. 3º em diante: sem bônus. Decida rápido."}
     ]}},
     {t:"w",text:"A qualquer momento (não apenas no seu turno): 3 Aliados do mesmo símbolo podem ser trocados por 1 Pérola. Aliados que sobrarem no fim viram troféus e valem pontos por conjunto."},
     {t:"s",n:2,label:"Passe a vez no sentido horário."},
     {t:"e",icon:"🏆",title:"FIM DE JOGO",text:"Quando o último Local for controlado, a rodada atual termina normalmente. Some: pontos dos Lordes + pontos dos Locais + 1 pt por Pérola Negra guardada + pontos dos troféus de Aliados. Maior total vence."}
   ]},

  {id:2,name:"Colt Express",players:"2–6",emoji:"🚂",
   goal:"Ser o bandido com mais dinheiro ao fim de 5 assaltos ao trem. Roube sacos dos passageiros, atire nos adversários e fuja do Marshal.",
   scoring:[{l:"Sacos de dinheiro roubados",v:"valor impresso em cada saco"},{l:"Joias roubadas",v:"valor impresso"},{l:"Bônus do personagem",v:"varia por personagem"},{l:"Quem deu mais tiros",v:"$1.000 de bônus"}],
   playerCard:{action:["Fase de Esquema: na sua vez, jogue 1 carta de ação na pilha central (para cima em rodada Normal, para baixo em Túnel)","Fase de Assalto: as cartas da pilha são resolvidas na ordem em que foram jogadas — sem alterar","Ações de carta: mover para vagão adjacente, subir/descer para o teto, roubar item do vagão, atirar em alguém, empurrar adversário, usar habilidade especial do personagem"],remember:["LEIA a habilidade do seu personagem antes de começar — cada um é completamente diferente","Em Túnel: suas cartas ficam viradas para baixo — você não vê o que os outros jogam","Levar tiro = a carta do TOPO do seu deck vai para o chão do vagão e é perdida","O Marshal se move em direção a qualquer tiro disparado na rodada"]},
   setup:["Montar o trem encaixando os vagões plásticos na ordem do cenário escolhido (normalmente 4–5 vagões + a locomotiva no fim)","Cada jogador escolhe um personagem, lê sua habilidade especial em voz alta para todos, pega o deck de 10 cartas único daquele personagem e posiciona seu peão no vagão indicado na ficha","Distribuir sacos de dinheiro e joias pelos vagões conforme indicado no cenário","Colocar o Marshal (xerife) na locomotiva — ele vai se mover durante o jogo","Montar a sequência de 5 rodadas com as cartas de Assalto do cenário escolhido"],
   flow:[
     {t:"s",n:1,label:"<strong>Fase de Esquema</strong> — Vire a carta de Assalto da rodada. Ela diz o tipo de rodada e quantas cartas cada jogador vai jogar nesta rodada.",branch:{title:"TIPOS DE RODADA",opts:[
       {tag:"Normal",text:"Cada jogador, na sua vez, joga 1 carta virada para CIMA na pilha central. Todo mundo vê o que os outros jogam.",hint:"Observe as cartas dos outros antes de jogar a sua — adapte sua estratégia em tempo real."},
       {tag:"Túnel / Telegrama",text:"Cartas são jogadas viradas para BAIXO. Ninguém vê as ações alheias até a Fase de Assalto.",warn:"Você não sabe onde os adversários estarão. Planeje com base nas posições atuais — não em suposições."},
       {tag:"Duplicada",text:"Cada jogador joga 2 cartas nesta rodada em vez de 1. A pilha fica maior e mais imprevisível."}
     ]}},
     {t:"s",n:2,label:"<strong>Fase de Assalto</strong> — Vire a pilha e resolva cada carta de cima para baixo, na ordem exata em que foram jogadas.",warn:"As ações são irrevogáveis — o que você planejou na Fase de Esquema acontece aqui, certo ou errado."},
     {t:"s",n:3,label:"<strong>O Marshal se move</strong> para o vagão de onde veio algum tiro nesta rodada. Bandidos no mesmo vagão que o Marshal recebem 1 tiro.",warn:"Levar tiro = a carta do TOPO do seu deck vai para o chão do vagão. Ela não volta ao deck — você perde aquela ação para sempre."},
     {t:"s",n:4,label:"Compre cartas até completar a mão para a próxima rodada. Cartas no chão por tiros não voltam.",warn:"Com muitos tiros seu deck fica fraco. Evite o Marshal ou use a habilidade do seu personagem para escapar."},
     {t:"e",icon:"💰",title:"FIM — APÓS 5 RODADAS",text:"Some o valor de todos os sacos e joias de cada bandido. Maior total vence. Em empate: quem deu mais tiros no total vence (e recebe $1.000 de bônus)."}
   ]},

  {id:3,name:"Ticket to Ride",players:"2–5",emoji:"🚃",
   goal:"Acumule mais pontos construindo rotas de trem no mapa e completando Destinos secretos. Cuidado: Destinos não completados subtraem pontos.",
   scoring:[{l:"Rotas construídas",v:"1 a 15 pts conforme o tamanho"},{l:"Destinos completados",v:"+ pontos indicados na carta"},{l:"Destinos não completados",v:"− pontos indicados na carta"},{l:"Rota mais longa contínua",v:"+10 pts (apenas 1 jogador)"}],
   playerCard:{action:["Faça UMA das três ações no seu turno: Comprar cartas de vagão, Construir uma rota, ou Pegar novas cartas de Destino","Comprar cartas: pegue 2 da área visível ou do deck. Locomotiva (curinga) da área visível = só 1 carta nesse turno","Construir rota: pague as cartas da cor e quantidade exata da rota; coloque seus trens de plástico sobre ela no mapa","Pegar Destinos: compre 3 cartas, fique com ao menos 1 e devolva o resto ao fundo do baralho"],remember:["Quando alguém ficar com 2 ou menos trens: todos têm exatamente mais 1 turno, depois para","Destinos não completados subtraem pontos — não pegue mais do que consegue cumprir","Rota mais longa contínua no fim = +10 pts para 1 jogador apenas","Rotas duplas (linhas paralelas): com 3+ jogadores, cada lado pertence a um jogador diferente"]},

  {id:4,name:"Terraforming Mars",players:"1–5",emoji:"🔴",
   goal:"Ter mais Pontos de Vitória ao final. Pontos vêm do seu TR (nível de terraformação), Florestas colocadas no tabuleiro, Cidades com florestas adjacentes e cartas com ícone de ponto. O jogo termina quando Temperatura, Oxigênio e Oceanos atingirem seus valores máximos.",
   scoring:[{l:"TR (Terraform Rating)",v:"1 pt por nível — começa em 20"},{l:"Florestas no tabuleiro",v:"1 pt cada"},{l:"Cidades",v:"1 pt por floresta adjacente (de qualquer jogador)"},{l:"Cartas com ícone 🌿",v:"valor indicado na carta"},{l:"Marcos reivindicados",v:"5 pts cada"},{l:"Prêmios financiados",v:"5/3/1 pts para 1º/2º/3º"}],
   playerCard:{action:["Fase de Pesquisa: compre 4 cartas novas, pague 3 MC por cada que quiser guardar, descarte as demais de graça","Fase de Ação: faça 1 ou 2 ações por vez (ou passe). Opções: jogar carta, usar ação de carta em jogo, converter 8 plantas em Floresta, converter 8 Calor em Temperatura, reivindicar Marco, financiar Prêmio","Fase de Produção: receba recursos. Seus MC por geração = TR + produção de MC da placa. Energia não usada vira Calor automaticamente"],remember:["TR sobe sempre que você aumenta um parâmetro global — é renda futura E pontos de vitória","Produção ≠ recurso: produção é o quanto você ganha por geração; recurso é o que você tem agora","Florestas adjacentes às suas Cidades multiplicam pontos no fim — posicionamento importa muito","Marcos: máximo 3 por jogo, 1 por jogador, custam 8 MC — reivindique cedo se já cumpre o critério"]},
   setup:["Montar o tabuleiro de Marte no centro e o tabuleiro individual de cada jogador à sua frente","Posicionar os marcadores nos parâmetros globais: Temperatura em −30°C, Oxigênio em 0%, Oceanos em 0 (de 9 fichas)","Cada jogador coloca seu marcador de TR na posição 20 da trilha — esse é seu ponto de partida","Distribuir 2 cartas de Corporação para cada jogador; cada um escolhe 1 em segredo e descarta a outra","Cada jogador recebe 10 cartas para o draft inicial — cada carta que quiser guardar custa 3 MC; as demais são descartadas de graça","Revelar as Corporações de todos ao mesmo tempo; cada jogador recebe os recursos e as produções iniciais indicados na sua Corporação"],
   flow:[
     {t:"s",n:1,label:"<strong>Fase de Pesquisa</strong> — Compre 4 cartas novas. Pague 3 MC por cada que guardar; descarte de graça as que não quiser.",hint:"Guarde só cartas que consiga jogar nesta geração ou com sinergia clara com sua Corporação. Guardar cartas inúteis desperdiça MC."},
     {t:"s",n:2,label:"<strong>Fase de Ação</strong> — Em ordem, cada jogador faz 1 ou 2 ações por vez e depois pode passar. A fase termina quando todos tiverem passado.",branch:{title:"AÇÕES DISPONÍVEIS",opts:[
       {tag:"Jogar carta",text:"Pague o custo em MC mostrado na carta. Verifique se os requisitos de parâmetros globais estão cumpridos (ex: 'Temperatura mínima −10°C'). Aplique o efeito imediatamente.",warn:"Requisitos não cumpridos = não pode jogar a carta ainda. Guarde cartas com requisitos altos para mais tarde na partida.",hint:"Cartas que aumentam produção valem mais no início do jogo; cartas que dão pontos valem mais perto do fim."},
       {tag:"Ação de carta",text:"Cartas com ícone de seta (→) têm uma ação especial ativável 1× por geração. Coloque um cubo sobre a carta após usar para lembrar que já foi ativada.",hint:"Ações de cartas são gratuitas (a não ser que a carta diga o contrário) — use todas que puder a cada geração."},
       {tag:"Converter plantas",text:"Gaste 8 plantas da sua placa → coloque 1 ficha de Floresta no tabuleiro de Marte + Oxigênio sobe 1% + seu TR sobe 1.",warn:"Posicione florestas adjacentes às suas Cidades — cada floresta adjacente vale 1 pt extra por Cidade no fim."},
       {tag:"Converter calor",text:"Gaste 8 de Calor da sua placa → Temperatura sobe 2°C + seu TR sobe 1.",hint:"Calor se acumula automaticamente da Energia não gasta a cada geração. Invista em produção de Calor para acelerar a Temperatura."},
       {tag:"Marco / Prêmio",text:"Marco: pague 8 MC, reivindique se cumprir o critério (ex: ter 3 Cidades). Vale 5 pts. Máximo 3 Marcos por jogo. Prêmio: pague 8/14/20 MC para financiar. No fim, os 3 primeiros no critério recebem 5/3/1 pts.",warn:"Marcos esgotam — se outro jogador reivindicar antes, você perde a chance. Financie Prêmios cedo se estiver liderando o critério."}

     {t:"s",n:3,label:"<strong>Fase de Produção</strong> — Todos produzem ao mesmo tempo: receba recursos conforme sua placa. MC recebidos = TR atual + produção de MC. Energia não usada vira Calor.",warn:"TR sobe toda vez que você aumenta um parâmetro global. Quanto mais alto o TR, mais MC você recebe por geração — e mais pontos no fim."},
     {t:"e",icon:"🌍",title:"FIM — 3 PARÂMETROS COMPLETOS",text:"Temperatura atingiu +8°C, Oxigênio chegou a 14%, e todos os 9 Oceanos foram colocados. Some: TR + Florestas (1 pt cada) + Cidades (1 pt por floresta adjacente) + cartas com pontos + Marcos + Prêmios. Maior total vence."}
   ]},

  {id:5,name:"Camel Up",players:"3–8",emoji:"🐪",
   goal:"Acumular mais libras (dinheiro) fazendo apostas corretas sobre qual camelo lidera cada etapa e a corrida completa. O jogo tem uma corrida de 5 camelos coloridos numa pista, e você aposta no resultado em vez de controlar os camelos.",
   scoring:[{l:"Apostas de etapa corretas",v:"1 a 5 libras conforme a ficha"},{l:"Apostas de etapa erradas",v:"−1 libra cada"},{l:"Aposta de corrida (1º lugar) correta",v:"bônus por ordem: quem apostou antes ganha mais"},{l:"Aposta de corrida (último lugar) correta",v:"mesmo sistema"},{l:"Oásis / Deserto colocados",v:"1 libra por camelo que parar na casa"}],
   playerCard:{action:["No seu turno, escolha UMA das 4 ações: Sacar dado da pirâmide, Apostar em etapa, Colocar ficha de Oásis/Deserto, ou Apostar no resultado final da corrida","Sacar dado: sacuda a pirâmide, retire 1 dado pelo buraco, mova o camelo daquela cor o número de casas indicado, ganhe 1 libra do banco","Apostar em etapa: pegue a ficha do topo da pilha do camelo que acha que vai estar na frente quando a etapa terminar"],remember:["Camelo no TOPO de uma pilha é o que está NA FRENTE — quando um camelo se move, ele carrega todos que estão sobre ele","A etapa termina quando os 5 dados forem sacados (pirâmide vazia); resolva apostas e reponha os 5 dados","Oásis (+1 casa) e Deserto (−1 casa) não podem ficar adjacentes a outras fichas nem na largada","Apostas de corrida são reveladas só no fim — a ordem de aposta importa"]},
   setup:["Montar a pista de corrida circular ou linear conforme indicado na caixa (as peças se encaixam)","Posicionar os 5 camelos coloridos na área de largada — a posição inicial é determinada por um saque inicial de dados (cada camelo sai 1 vez antes do jogo começar)","Colocar os 5 dados coloridos (1 por camelo) dentro da pirâmide e fechar — a pirâmide é o dispositivo plástico que embaralha e libera 1 dado por vez","Distribuir as fichas de aposta de etapa empilhadas (1 pilha por camelo, valores 5/3/2/2/2 de cima para baixo) e 3 libras a cada jogador","Distribuir 1 ficha de Oásis e 1 ficha de Deserto para cada jogador","O jogador mais animado começa"],
   flow:[
     {t:"s",n:1,label:"<strong>Escolha UMA das 4 ações:</strong>",branch:{title:"OPÇÕES",opts:[
       {tag:"Sacar dado",text:"Segure a pirâmide, chacoalhe e pressione o buraco — 1 dado sai aleatoriamente. Mova o camelo daquela cor o número de casas indicado no dado. Ganhe 1 libra do banco.",warn:"Quando um camelo se move, ele carrega TODOS os camelos que estão em cima dele — a pilha inteira se move junto.",hint:"Sacar dado é a ação mais segura — garante 1 libra e avança a etapa."},
       {tag:"Apostar etapa",text:"Pegue a ficha do topo da pilha do camelo que acha que estará na frente quando a etapa terminar (todos os 5 dados sacados). A ficha do topo vale mais (5 libras); as de baixo valem menos.",warn:"Errar uma aposta de etapa custa 1 libra. Fichas de 2 libras na base da pilha são mais seguras mas rendem menos.",hint:"Aposte no camelo que está atrás mas tem poucos dados sacados — ele pode ainda se mover várias vezes."},
       {tag:"Colocar ficha",text:"Coloque sua ficha de Oásis (move o camelo +1 casa ao parar ali) ou Deserto (move −1 casa) em qualquer casa vazia, não adjacente a outra ficha. Ganhe 1 libra sempre que um camelo parar nela.",warn:"Fichas não podem ser colocadas na largada, em casas com camelos, nem adjacentes a outras fichas de Oásis/Deserto."},
       {tag:"Apostar corrida",text:"Coloque sua carta de aposta virada para baixo na pilha de 1º lugar ou de último lugar da corrida completa. Quem apostou mais cedo recebe mais se acertar; quem errou perde 1 libra.",hint:"Aposte no favorito cedo para garantir o bônus maior. Apostas no último lugar são mais difíceis mas também rentáveis."}
     ]}},
     {t:"s",n:2,label:"<strong>A etapa termina</strong> quando todos os 5 dados forem sacados. Resolva apostas: quem apostou no líder recebe o valor da ficha; os demais perdem 1 libra cada. Reponha os 5 dados na pirâmide e comece nova etapa.",warn:"Resolva apostas em ordem de valor decrescente (5 → 3 → 2 → 2 → 2). Fichas de mesma cor são resolvidas da mais cara para a mais barata."},
     {t:"e",icon:"🏁",title:"FIM DE CORRIDA",text:"Quando um camelo cruzar a linha de chegada: termine a etapa normalmente, depois revele e resolva as apostas de corrida (1º e último lugar). Quem tiver mais libras no total vence."}
   ]},

  {id:6,name:"Kingsburg",players:"2–5",emoji:"🏰",
   goal:"Construir o reino com mais Pontos de Vitória ao longo de 5 anos (rodadas). Você usa dados para ativar Conselheiros do Rei, que te dão recursos para construir melhorias na sua cidade. No inverno, um inimigo ataca todos — quem não tiver soldados perde construções.",
   scoring:[{l:"Construções na cidade",v:"1 a 4 pts cada (impressos no tabuleiro)"},{l:"Bônus de fim de ano",v:"variável conforme construções"},{l:"Vitória militar no inverno",v:"pts adicionais"},{l:"Cartas de Destino (variante)",v:"pts por objetivo cumprido"}],
   playerCard:{action:["Role seus 3 dados. O jogador com menor total aloca primeiro","Na sua vez: escolha 1 Conselheiro disponível cujo número seja igual à soma de 1, 2 ou 3 dos seus dados. Receba o bônus desse Conselheiro (recursos, soldados ou PV)","Continue alocando dados até usá-los todos ou não querer mais Conselheiros","Depois que todos alocaram: construa 1 melhoria na sua cidade gastando os recursos recebidos"],remember:["Os 18 Conselheiros têm números de 1 a 18 — você usa dados que somem exatamente esse número","Menor total de dados = joga primeiro = escolhe Conselheiro antes dos outros","Use sua ficha de Influência para +1 ou −1 em qualquer dado (1 vez por estação)","No inverno, o Rei rola 3 dados — esse é o valor do inimigo que ataca a todos; cada ponto de força sem soldados = 1 construção perdida"]},
   setup:["Montar o tabuleiro central com os 18 Conselheiros numerados e o tabuleiro individual de cada jogador (mostrando a árvore de construções da cidade)","Dar 3 dados de uma cor única a cada jogador + 1 ficha de Influência","Zerar todos os marcadores de recursos (Madeira, Pedra, Ouro, Alimento, Magia) nos tabuleiros individuais","Posicionar o marcador de ano no espaço 1 (o jogo dura 5 anos)","Separar as cartas de Destino se for usar a variante (recomendado para jogadores avançados)","Sortear quem começa o primeiro ano"],
   flow:[
     {t:"s",n:1,label:"<strong>Primavera, Verão e Outono</strong> — cada ano tem 3 estações produtivas, cada uma com as mesmas fases:",branch:{title:"FASES DE CADA ESTAÇÃO",opts:[
       {tag:"1. Rolar dados",text:"Todos rolam seus 3 dados ao mesmo tempo. Quem tiver menor total vai primeiro nesta estação. Em empate, quem tem menos PVs decide.",warn:"Use sua ficha de Influência (1× por estação) para somar +1 ou subtrair −1 de qualquer dado antes de alocar.",hint:"Dados baixos têm prioridade para alocar — às vezes é melhor garantir um Conselheiro pequeno do que arriscar um alto e ficar sem nenhum."},
       {tag:"2. Alocar dados",text:"Em ordem crescente de total, cada jogador aloca 1 ou mais dados em 1 Conselheiro disponível — a soma dos dados alocados deve ser exatamente igual ao número do Conselheiro. Receba o bônus imediatamente.",warn:"Um Conselheiro ocupado não pode ser ativado por outro jogador na mesma estação. Se não conseguir ativar nenhum Conselheiro, perde a vez.",hint:"Conselheiros do meio (7–12) costumam dar os melhores recursos. Os extremos (1–3 e 15–18) dão bônus especiais como soldados ou PVs."},
       {tag:"3. Construir",text:"Após todos alocarem: gaste seus recursos para construir 1 melhoria na árvore de construções da sua cidade. Construções são permanentes — seus efeitos se acumulam ao longo dos 5 anos.",hint:"Construções que aumentam produção de recursos têm efeito composto — priorize-as nos primeiros anos para construir mais no final."}
     ]}},
     {t:"s",n:2,label:"<strong>Inverno</strong> — O Rei rola 3 dados: a soma é o valor de força do inimigo que ataca TODOS os jogadores simultaneamente. Cada jogador enfrenta com seus soldados acumulados.",warn:"Cada ponto de força do inimigo não coberto por soldados = perca 1 construção da sua cidade. Construa soldados no outono para estar preparado. Anos 3 e 5 têm inimigos mais fortes."},
     {t:"s",n:3,label:"Fim do ano: receba os bônus de fim de ano baseados no número de construções que você tem. Avance o marcador de ano.",hint:"O bônus de fim de ano cresce com o número de construções — tente sempre construir pelo menos 1 por ano."},
     {t:"e",icon:"👑",title:"FIM — APÓS 5 ANOS",text:"Some os pontos de todas as construções (impressos no tabuleiro individual) + bônus acumulados + pontos de Destino se estiver usando a variante. Maior total vence."}
   ]},

  {id:7,name:"7 Wonders",players:"2–7",emoji:"🏛️",
   goal:"Desenvolver a civilização com mais Pontos de Vitória após 3 eras. Cada jogador tem uma Maravilha histórica para construir e um conjunto de cartas para desenvolver. Pontos vêm de muitas fontes diferentes — diversificar costuma ser mais eficiente que especializar.",
   scoring:[{l:"Estruturas civis (azul)",v:"pontos fixos impressos"},{l:"Conflito militar (escudos)",v:"1/3/5 pts por vitória em cada era"},{l:"Derrota militar",v:"−1 pt por derrota em cada era"},{l:"Moedas restantes",v:"1 pt a cada 3 moedas"},{l:"Pesquisa científica (verde)",v:"conjuntos de 3 tipos iguais + pares"},{l:"Estruturas comerciais (amarelas)",v:"pts variáveis"},{l:"Guildas (roxas, era III)",v:"pts baseados nas construções dos vizinhos"},{l:"Estágios da Maravilha",v:"pontos indicados em cada estágio"}],
   playerCard:{action:["Receba 7 cartas. Escolha 1 em segredo e passe o restante para o vizinho (Era I→esquerda; Era II→direita; Era III→esquerda). Repita até 6 jogadas; a 7ª carta é descartada sem efeito","Com a carta escolhida, faça UMA das 3 opções: Construir (pague os recursos indicados e coloque virada para cima na sua área), Descartar (devolva ao banco e receba 3 moedas), ou Avançar Maravilha (coloque a carta virada para baixo sob o próximo estágio e receba o bônus do estágio)","Recursos insuficientes: compre de vizinhos por 2 moedas cada (ou 1 com estrutura comercial amarela) — o vizinho recebe as moedas"],remember:["Draft = você escolhe 1 carta e passa as demais para o lado — observe o que está passando para o vizinho","Corrente de construção: algumas cartas têm um símbolo que permite construir outra carta de graça — leia os ícones","Comprar recurso de vizinho não precisa de permissão — só pague 2 moedas ao vizinho por cada recurso faltante","Ignorar escudos militares por 3 eras pode resultar em até −9 pts contra cada vizinho"]},
   setup:["Distribuir 1 tabuleiro de Maravilha aleatório a cada jogador (use o lado A para a primeira partida — lado B é mais avançado)","Cada jogador coloca na mesa os recursos iniciais indicados na sua Maravilha e recebe 3 moedas do banco","Separar as cartas por era (I, II, III) — as Guildas (cartas roxas) só entram na Era III. Embaralhar cada pilha separadamente","Distribuir 7 cartas da Era I a cada jogador — olhe em segredo sem mostrar para ninguém","Posicionar as fichas de conflito militar entre cada par de jogadores vizinhos","Sortear quem olha as cartas primeiro (todos olham ao mesmo tempo na prática)"],
   flow:[
     {t:"s",n:1,label:"<strong>Draft — o mecanismo central do jogo:</strong> todos escolhem 1 carta ao mesmo tempo, revelam juntos, e passam o restante para o vizinho. Repita 6 vezes.",branch:{title:"SEQUÊNCIA DE CADA RODADA",opts:[
       {tag:"1. Escolher",text:"Olhe suas cartas em segredo. Escolha 1 e coloque virada para baixo na mesa. Quando todos estiverem prontos, todos revelam ao mesmo tempo.",hint:"Pense no que o vizinho receberá — às vezes é melhor descartar uma carta boa do que passá-la para quem pode usá-la melhor."},
       {tag:"2. Jogar a carta",text:"Com a carta revelada, escolha: Construir pagando os recursos, Descartar para receber 3 moedas, ou Avançar estágio da Maravilha colocando a carta por baixo.",warn:"Sem recursos suficientes: compre de vizinhos (2 moedas por recurso ao vizinho da esquerda ou direita) ou descarte por 3 moedas. Você NÃO pode construir sem pagar."},
       {tag:"3. Passar cartas",text:"Passe as cartas restantes para o vizinho. Era I: para a esquerda. Era II: para a direita. Era III: para a esquerda.",hint:"Fique de olho no que está passando — não alimente a estratégia do vizinho. Se ele está acumulando escudos, passe menos cartas militares."}
     ]}},
     {t:"s",n:2,label:"<strong>Conflito Militar</strong> ao fim de cada era — compare o total de Escudos (símbolo de espada) com cada vizinho imediato. Vencer = ficha de vitória (1/3/5 pts na Era I/II/III). Perder = −1 pt.",warn:"Ignorar completamente o militar pode custar muitos pontos negativos. Não precisa ser o mais forte, só mais forte que os vizinhos."},
     {t:"e",icon:"🏛️",title:"FIM — APÓS 3 ERAS",text:"Some todos os tipos de ponto: civis (azul) + militar + moedas (÷3, arredonde para baixo) + pesquisa (verde) + comercial (amarelo) + guildas (roxo) + Maravilha. Use a tabela de pontuação da caixa para não esquecer nada. Maior total vence."}
   ]},

  {id:8,name:"Coup",players:"2–6",emoji:"🎭",
   goal:"Ser o último jogador com pelo menos 1 carta na mão. Você começa com 2 cartas (= 2 influências). Cada carta perdida é 1 influência a menos. Sem cartas = eliminado.",
   scoring:[{l:"Último jogador com carta na mão",v:"vence"},{l:"Perder uma carta",v:"−1 influência (vira pública)"},{l:"Perder as 2 cartas",v:"eliminado"}],

   setup:["Embaralhar as 15 cartas (3 cópias de cada um dos 5 personagens: Duque, Assassino, Capitão, Condessa, Embaixador)","Distribuir 2 cartas viradas para baixo a cada jogador — olhe as suas em segredo, sem mostrar para ninguém","Cada jogador recebe 2 moedas do banco","O jogador mais desconfiado começa"],
   flow:[

// ── STATE ──
let curGame=null, curMode='normal', curCol=0, searchQ='';

// ── RENDER GRID ──
function renderColTabs(){
  document.getElementById('colTabs').innerHTML=COLS.map((c,i)=>
    `<button class="col-tab ${curCol===i?'active':''}" onclick="setCol(${i})">${c.label}</button>`
  ).join('');
}
function setCol(i){curCol=i;searchQ='';document.getElementById('searchInput').value='';renderColTabs();renderGrid();}

function renderGrid(){
  const grid=document.getElementById('gameGrid');
  const ids=COLS[curCol].ids;
  let list=ids?GAMES.filter(g=>ids.includes(g.id)):GAMES;
  if(searchQ){
    const q=searchQ.toLowerCase();
    list=list.filter(g=>g.name.toLowerCase().includes(q));
  }
  if(!list.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum jogo encontrado</div></div>`;
    return;
  }
  grid.innerHTML=list.map(game=>`
    <div class="game-card" onclick="openPanel(${game.id})">
      <span class="game-emoji">${game.emoji}</span>
      <div class="game-title">${game.name}</div>
      <div class="game-meta">${game.players} jog.</div>
      <span class="game-badge">✓ ficha pronta</span>
    </div>`).join('');
}

// ── PANEL ──
function openPanel(id){
  curGame=id; curMode='normal';
  const g=GAMES.find(x=>x.id===id);
  document.getElementById('panelTitle').textContent=`${g.emoji} ${g.name}`;
  document.getElementById('panelMeta').textContent=`${g.players} jogadores`;
  renderModeTabs();
  document.getElementById('goalBar').innerHTML=`<strong>🎯 OBJETIVO</strong><p>${g.goal}</p>`;
  document.getElementById('scoreBar').innerHTML=`<strong>🏅 PONTUAÇÃO</strong><div class="score-pills">${g.scoring.map(s=>`<div class="score-pill"><span>${s.l}</span><span class="sp-val">${s.v}</span></div>`).join('')}</div>`;
  renderBody();
  document.getElementById('panelOverlay').classList.add('open');
  document.getElementById('panelOverlay').querySelector('.panel-scroll').scrollTop=0;
}
function closePanel(){
  document.getElementById('panelOverlay').classList.remove('open');
  curGame=null;
}
const COMPANION_GAMES=[4,6];
const CALC_GAMES=[7];
function renderModeTabs(){
  const g=GAMES.find(x=>x.id===curGame);
  const tabs=[{k:'normal',l:'📋 Ficha'},{k:'newbie',l:'🎓 Primeira partida'},{k:'player',l:'🃏 Meu turno'}];
  if(g&&COMPANION_GAMES.includes(g.id))tabs.push({k:'companion',l:'🎮 Companion'});
  if(g&&CALC_GAMES.includes(g.id))tabs.push({k:'calc',l:'🏛 Pontuação'});
  document.getElementById('modeTabs').innerHTML=tabs.map(m=>
    `<button class="mode-tab ${curMode===m.k?'active':''}" onclick="setMode('${m.k}')">${m.l}</button>`
  ).join('');
}
function setMode(m){curMode=m;renderModeTabs();renderBody();document.getElementById('panelOverlay').querySelector('.panel-scroll').scrollTop=0;}

// ── FLOW BUILDER ──
function buildFlow(flow,hints){
  let h='',sc=0;
  const steps=flow.filter(n=>n.t==='s');
  flow.forEach(node=>{
    if(node.t==='s'){
      sc++;
      h+=`<div class="flow-node"><div class="fnh"><div class="fn">${node.n}</div><div class="fl">${node.label}</div></div>`;
      if(node.warn)h+=`<div class="flow-warn"><div class="fwd"></div><div class="fwt">${node.warn}</div></div>`;
      if(node.hint&&hints)h+=`<div class="flow-hint">🎓 ${node.hint}</div>`;
      if(node.branch){
        h+=`<div class="flow-branch"><div class="fbt">${node.branch.title}</div>`;
        node.branch.opts.forEach(o=>{
          h+=`<div class="flow-option"><span class="fot">${o.tag}</span><div class="fox">${o.text}`;
          if(o.warn)h+=`<span class="fow">⚠ ${o.warn}</span>`;
          if(o.hint&&hints)h+=`<span class="foh">🎓 ${o.hint}</span>`;
          h+=`</div></div>`;
        });
        h+=`</div>`;
      }
      h+=`</div>`;
      if(sc<steps.length||flow.find(n=>n.t==='e'))h+=`<div class="flow-arrow">↓</div>`;
    } else if(node.t==='w'){
      h+=`<div class="fwb"><div class="fwd"></div><div class="fwt">${node.text}</div></div><div class="flow-arrow">↓</div>`;
    } else if(node.t==='e'){
      h+=`<div class="flow-end"><div class="fei">${node.icon}</div><div class="fet"><strong>${node.title}</strong>${node.text}</div></div>`;
    }
  });
  return h;
}

function renderBody(){
  const g=GAMES.find(x=>x.id===curGame);if(!g)return;
  if(curMode==='calc'){
    if(g.id===7)renderCalc7W();
    return;
  }
    if(g.id===4)renderCompanionTM();
    else if(g.id===6)renderCompanionKB();
    return;
  }
  if(curMode==='player'){
    let h=`<div class="sec-title">Cartão do jogador</div><div class="player-card"><div class="pct"><span>${g.emoji}</span>${g.name} — O que fazer no meu turno</div>`;
    h+=`<div class="pc-section"><div class="pc-label">Ações</div>`;
    g.playerCard.action.forEach((a,i)=>{h+=`<div class="pc-item"><div class="pc-num">${i+1}</div><div>${a}</div></div>`;});
    h+=`</div><div class="pc-section"><div class="pc-label">Não esqueça</div>`;
    g.playerCard.remember.forEach(r=>{h+=`<div class="pc-item"><div class="pc-num">⚠</div><div>${r}</div></div>`;});
    h+=`</div><div class="pc-rem">💡 Dúvida em algum termo? Veja a aba Ficha.</div></div>`;
    document.getElementById('panelBody').innerHTML=h;return;
  }
  const hints=curMode==='newbie';
  let h=`<div class="sec-title">Preparação</div><div class="check-list">`;
  g.setup.forEach(s=>{h+=`<div class="check-item" onclick="toggleCheck(this)"><div class="check-box"></div><div class="check-text">${s}</div></div>`;});
  h+=`</div><div class="sec-title">Como jogar</div><div class="flow-wrap">${buildFlow(g.flow,hints)}</div>`;
  document.getElementById('panelBody').innerHTML=h;
}

function tmShowTab(t){
  ['placa','params','marcos','prod'].forEach(s=>{
    const el=document.getElementById('tm-'+s);
    const tabs=document.querySelectorAll('.tm-tab');
    const idx=['placa','params','marcos','prod'].indexOf(s);
    if(el)el.className='tm-screen'+(t===s?' active':'');
    if(tabs[idx])tabs[idx].className='tm-tab'+(t===s?' active':'');
  });
}
function tmTogTip(id){const el=document.getElementById(id);if(el)el.classList.toggle('show');}
function tmChangeTR(d){TM.tr=Math.max(0,Math.min(63,TM.tr+d));tmRenderTR();}
function tmRenderTR(){
  const el=document.getElementById('tm-tr-val');const rv=document.getElementById('tm-renda');
  if(el)el.textContent=TM.tr;if(rv)rv.textContent=`${TM.tr}+${TM.prod.mc}=${TM.tr+TM.prod.mc}✦`;
}
function tmChangeRes(k,d){TM.res[k]=Math.max(0,TM.res[k]+d);tmRenderTracks();}
function tmRenderTracks(){
  const el=document.getElementById('tm-tracks');if(!el)return;
  el.innerHTML=TM_RES.map(r=>`<div class="tm-track" style="border-left:3px solid ${r.color};"><div class="tm-t-icon" style="background:${r.bg};border-color:${r.color}30;"><span style="color:${r.color};">${r.icon}</span></div><div class="tm-t-body"><div class="tm-t-name" style="color:${r.color};">${r.label}</div><div class="tm-t-hint">${r.hint}</div></div><div class="tm-t-right"><div class="tm-t-num" style="color:${r.color};">${TM.res[r.k]}</div><div class="tm-t-btns"><button class="tm-btn-sm" onclick="tmChangeRes('${r.k}',-1)">−</button><button class="tm-btn-sm" onclick="tmChangeRes('${r.k}',1)">+</button></div></div></div>`).join('');
}
function tmChParam(p,d){
  if(p==='temp'){
    TM.temp=Math.max(0,Math.min(19,TM.temp+d));
    const v=-30+TM.temp*2;
    const el=document.getElementById('tm-temp-val');if(el)el.textContent=(v>=0?'+':'')+v+'°C';
    const bar=document.getElementById('tm-temp-bar');if(bar)bar.style.width=(TM.temp/19*100)+'%';
    const f=document.getElementById('tm-temp-f');if(f)f.textContent=19-TM.temp;
    if(d>0){tmChangeTR(1);tmToast('Temperatura +2°C → TR +1');}
  } else {
    const prev=TM.oxy;TM.oxy=Math.max(0,Math.min(14,TM.oxy+d));
    const el=document.getElementById('tm-oxy-val');if(el)el.textContent=TM.oxy+'%';
    const bar=document.getElementById('tm-oxy-bar');if(bar)bar.style.width=(TM.oxy/14*100)+'%';
    const f=document.getElementById('tm-oxy-f');if(f)f.textContent=14-TM.oxy;
    if(d>0){
      tmChangeTR(1);
      if(prev<8&&TM.oxy>=8){
        TM.temp=Math.min(19,TM.temp+1);const v=-30+TM.temp*2;
        const te=document.getElementById('tm-temp-val');if(te)te.textContent=(v>=0?'+':'')+v+'°C';
        const tb=document.getElementById('tm-temp-bar');if(tb)tb.style.width=(TM.temp/19*100)+'%';
        const tf=document.getElementById('tm-temp-f');if(tf)tf.textContent=19-TM.temp;
        tmChangeTR(1);tmToast('Oxigênio 8%! Temperatura subiu automaticamente · TR +2 total');

  {id:'military',name:'Militar',color:'#E24B4A',hint:'Compare escudos com cada vizinho por era. Vitória +1/+3/+5 pts. Derrota −1 pt.'},
  {id:'coins',name:'Moedas',color:'#EF9F27',hint:'Cada grupo de 3 moedas = 1 ponto (arredonde para baixo).'},

function w7MkVals(){return{mE1L:'none',mE1R:'none',mE2L:'none',mE2R:'none',mE3L:'none',mE3R:'none',coins:0,wonder:0,civilian:0,sci_c:0,sci_g:0,sci_t:0,commerce:0,guilds:0};}
function w7GetPts(id,v){
  if(id==='military'){let p=0;[[1,'mE1L'],[1,'mE1R'],[2,'mE2L'],[2,'mE2R'],[3,'mE3L'],[3,'mE3R']].forEach(([e,k])=>{const r=v[k]||'none';if(r==='win')p+=W7_ERA_WIN[e-1];else if(r==='loss')p-=1;});return p;}
  if(id==='coins')return Math.floor((v.coins||0)/3);
  if(id==='science'){const c=v.sci_c||0,g=v.sci_g||0,t=v.sci_t||0;return Math.min(c,g,t)*7+c*c+g*g+t*t;}
  const m={wonder:'wonder',civilian:'civilian',commerce:'commerce',guilds:'guilds'};
  return v[m[id]]||0;
}
function w7Total(v){return W7_CATS.reduce((s,c)=>s+w7GetPts(c.id,v),0);}

}
function w7SetEra(k,v){w7Vals[k]=v;w7RenderCats();w7UpdTotal();}
function w7RefPts(){W7_CATS.forEach(c=>{const el=document.getElementById('w7pts-'+c.id);if(!el)return;const pts=w7GetPts(c.id,w7Vals);el.textContent=pts;el.style.color=pts<0?'#f07070':c.color;});w7UpdTotal();}
function w7UpdTotal(){const el=document.getElementById('sw-total');if(el)el.textContent=w7Total(w7Vals)+' pts';}
function w7SaveNext(){
  w7Scores[w7Players[w7Cur]]={...w7Vals};
  const next=w7Players.findIndex((p,i)=>i>w7Cur&&w7Scores[p]===null);
  if(next!==-1){w7Cur=next;w7Vals=w7MkVals();w7RenderPbar();w7RenderCats();w7UpdTotal();}
  else{const any=w7Players.findIndex(p=>w7Scores[p]===null);if(any!==-1){w7Cur=any;w7Vals=w7MkVals();w7RenderPbar();w7RenderCats();w7UpdTotal();}else w7ShowRanking();}
}
function w7ShowRanking(){
  const ranked=w7Players.map(p=>({name:p,total:w7Total(w7Scores[p]),cats:W7_CATS.map(c=>({color:c.color,pts:w7GetPts(c.id,w7Scores[p])}))})).sort((a,b)=>b.total-a.total);
  const medals=['🥇','🥈','🥉'];
  const el=document.getElementById('sw-rank-list');if(!el)return;
  el.innerHTML=`<div style="font-size:14px;font-weight:600;color:#f0e8ff;margin-bottom:12px;letter-spacing:.5px;">RESULTADO FINAL</div>
    ${ranked.map((r,i)=>`<div class="sw-rank-card ${i===0?'winner':''}"><div class="sw-rank-medal">${medals[i]||i+1+'.'}</div><div style="flex:1;"><div style="display:flex;align-items:baseline;justify-content:space-between;"><div class="sw-rank-name">${r.name}</div><div class="sw-rank-total">${r.total}</div></div><div class="sw-rank-bd">${r.cats.map(c=>`<div class="sw-rank-mini"><div class="sw-rank-dot" style="background:${c.color};"></div>${c.pts}</div>`).join('')}</div></div></div>`).join('')}
    <div style="font-size:11px;color:#4a3a70;margin-top:10px;line-height:1.8;">${W7_CATS.map(c=>`<span style="display:inline-flex;align-items:center;gap:3px;margin-right:8px;"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${c.color};"></span>${c.name}</span>`).join('')}</div>`;
  w7ShowSW('ranking');
}
function w7Reset(){w7Players=[];w7Scores={};w7Cur=0;w7Vals={};w7RenderSetup();w7ShowSW('setup');}

// ── INIT ──
renderColTabs();
renderGrid();
</script>
</body>
</html>
